name: echo-surface

services:
  demo:
    build:
      context: .
      args:
        VITE_BASE_PATH: /
    image: echo-surface:local
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
